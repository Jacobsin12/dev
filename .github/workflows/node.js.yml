name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Usamos las versiones que definiste en tu manual
        node-version: [18.x, 22.x] 

steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      # Esto es CLAVE: instala todo limpio en el servidor
      run: npm install 

    - name: Run Jest tests
      # Ahora sí tendrá permisos
      run: npm testnpx jest
