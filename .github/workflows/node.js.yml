name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Usamos las versiones que definiste en tu manual
        node-version: [18.x, 22.x] 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      # Esto instalará jest y supertest que están en tus devDependencies
      run: npm install 

    - name: Run Jest tests
      # Esto ejecutará el script "test" de tu package.json
      run: npm test
